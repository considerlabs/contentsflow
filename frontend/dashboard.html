<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ContentFlow — 대시보드</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Noto Sans KR', sans-serif;
         background: #f0f2f5; color: #222; min-height: 100vh; }

  header { background: #fff; border-bottom: 1px solid #e5e7eb; padding: 0 32px;
           display: flex; align-items: center; height: 56px; gap: 24px; position: sticky; top: 0; z-index: 100; }
  header .logo { font-weight: 800; font-size: 16px; color: #2563eb; flex: 1; }
  header a { font-size: 13px; color: #666; text-decoration: none; }
  header a:hover { color: #2563eb; }

  .layout { display: grid; grid-template-columns: 420px 1fr; gap: 20px;
            max-width: 1200px; margin: 0 auto; padding: 24px; }

  .card { background: #fff; border-radius: 14px; padding: 24px;
          box-shadow: 0 1px 6px rgba(0,0,0,.06); }
  .card-title { font-size: 15px; font-weight: 700; margin-bottom: 18px; display: flex; align-items: center; gap: 8px; }

  label { display: block; font-size: 12px; font-weight: 600; color: #555; margin-bottom: 5px; margin-top: 14px; }
  label:first-of-type { margin-top: 0; }
  input[type=text], textarea {
    width: 100%; border: 1.5px solid #e0e0e0; border-radius: 8px;
    padding: 9px 12px; font-size: 14px; outline: none; transition: border-color .2s; }
  input:focus, textarea:focus { border-color: #2563eb; }

  button { padding: 9px 20px; border-radius: 8px; border: none; cursor: pointer;
           font-size: 13px; font-weight: 600; transition: all .2s; }
  .btn-primary { background: #2563eb; color: #fff; width: 100%; margin-top: 16px; padding: 11px; }
  .btn-primary:hover { background: #1d4ed8; }
  .btn-primary:disabled { background: #93c5fd; cursor: not-allowed; }
  .btn-sm { padding: 6px 14px; font-size: 12px; }
  .btn-ghost  { background: #f0f0f0; color: #444; }
  .btn-ghost:hover  { background: #e0e0e0; }
  .btn-approve  { background: #dcfce7; color: #16a34a; }
  .btn-approve:hover  { background: #bbf7d0; }
  .btn-revise   { background: #fef9c3; color: #854d0e; }
  .btn-revise:hover   { background: #fef08a; }
  .btn-reject   { background: #fee2e2; color: #dc2626; }
  .btn-reject:hover   { background: #fecaca; }

  /* 주제 후보 */
  .topic-list { display: flex; flex-direction: column; gap: 10px; margin-top: 4px; }
  .topic-card { border: 1.5px solid #e0e0e0; border-radius: 10px; padding: 14px;
                cursor: pointer; transition: all .2s; }
  .topic-card:hover { border-color: #93c5fd; background: #f8faff; }
  .topic-card.selected { border-color: #2563eb; background: #eff6ff; }
  .topic-card .t-title { font-weight: 600; font-size: 14px; margin-bottom: 4px; }
  .topic-card .t-msg   { font-size: 12px; color: #666; }
  .topic-card .t-badge { font-size: 11px; color: #2563eb; font-weight: 600; margin-top: 6px; }

  /* 채널 선택 */
  .ch-row { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-top: 6px; }
  .ch-chip { border: 1.5px solid #e0e0e0; border-radius: 8px; padding: 8px 12px;
             cursor: pointer; font-size: 13px; font-weight: 600; text-align: center; transition: all .2s; }
  .ch-chip.selected { border-color: #2563eb; background: #eff6ff; color: #2563eb; }

  /* 진행 상태 */
  .status-box { background: #f8faff; border: 1px solid #c7d9ff; border-radius: 10px;
                padding: 16px; text-align: center; margin-top: 16px; }
  .status-box .status-text { font-size: 14px; font-weight: 600; color: #2563eb; }
  .status-box .status-sub  { font-size: 12px; color: #666; margin-top: 4px; }
  .spinner { display: inline-block; width: 16px; height: 16px; border: 2px solid #c7d9ff;
             border-top-color: #2563eb; border-radius: 50%; animation: spin .8s linear infinite;
             margin-right: 8px; vertical-align: middle; }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* 검수 목록 */
  .draft-list { display: flex; flex-direction: column; gap: 10px; }
  .draft-card { border: 1.5px solid #eee; border-radius: 10px; padding: 14px 16px;
                cursor: pointer; transition: all .2s; }
  .draft-card:hover { border-color: #93c5fd; box-shadow: 0 2px 8px rgba(37,99,235,.1); }
  .draft-card.no-content { border-color: #fde68a; background: #fffbeb; }
  .draft-card.no-content:hover { border-color: #fbbf24; }
  .draft-meta { display: flex; align-items: center; gap: 8px; margin-bottom: 6px; }
  .ch-badge { font-size: 11px; font-weight: 700; padding: 2px 8px; border-radius: 20px; }
  .ch-badge.blog       { background: #ede9fe; color: #7c3aed; }
  .ch-badge.newsletter { background: #fce7f3; color: #db2777; }
  .ch-badge.youtube    { background: #fee2e2; color: #dc2626; }
  .ch-badge.shortform  { background: #f3f4f6; color: #374151; }
  .qc-badge { font-size: 11px; padding: 2px 8px; border-radius: 20px; margin-left: auto; }
  .qc-ok   { background: #dcfce7; color: #16a34a; }
  .qc-fail { background: #fee2e2; color: #dc2626; }
  .draft-title { font-weight: 600; font-size: 14px; }
  .draft-date  { font-size: 11px; color: #aaa; margin-top: 4px; }
  .empty { text-align: center; color: #bbb; font-size: 14px; padding: 32px 0; }

  /* 모달 */
  .overlay { position: fixed; inset: 0; background: rgba(0,0,0,.4); z-index: 200;
             display: none; align-items: center; justify-content: center; padding: 24px; }
  .overlay.open { display: flex; }
  .modal { background: #fff; border-radius: 16px; width: 100%; max-width: 720px;
           max-height: 90vh; display: flex; flex-direction: column; overflow: hidden; }
  .modal-header { padding: 20px 24px; border-bottom: 1px solid #eee;
                  display: flex; align-items: center; gap: 10px; }
  .modal-header h2 { flex: 1; font-size: 16px; font-weight: 700; }
  .modal-body { padding: 20px 24px; overflow-y: auto; flex: 1; }
  .modal-body pre { white-space: pre-wrap; font-family: 'Courier New', monospace;
                    font-size: 13px; line-height: 1.7; background: #f8f9fa;
                    border-radius: 8px; padding: 16px; }
  .modal-footer { padding: 16px 24px; border-top: 1px solid #eee;
                  display: flex; gap: 8px; align-items: flex-end; }
  .modal-footer textarea { flex: 1; min-height: 60px; resize: none; font-size: 13px; }
  .modal-actions { display: flex; flex-direction: column; gap: 6px; }

  .toast { position: fixed; bottom: 24px; right: 24px; background: #1e293b; color: #fff;
           padding: 12px 20px; border-radius: 10px; font-size: 13px; font-weight: 500;
           transform: translateY(80px); opacity: 0; transition: all .3s; z-index: 999; }
  .toast.show { transform: translateY(0); opacity: 1; }

  @media (max-width: 768px) {
    .layout { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>

<header>
  <div class="logo">✦ ContentFlow</div>
  <a href="/frontend/settings.html">⚙ 설정</a>
  <a href="/frontend/onboarding.html">온보딩</a>
</header>

<div class="layout">

  <!-- ── 왼쪽: 콘텐츠 생성 ──────────────────────────── -->
  <div>
    <div class="card" id="gen-card">
      <div class="card-title">✦ 새 콘텐츠 생성</div>
      <div id="gen-form">
        <label>키워드</label>
        <input type="text" id="kw" placeholder="50대 직장인 AI 부업" />
        <label>타겟 감정</label>
        <input type="text" id="emotion" placeholder="퇴직 불안, 수입 걱정" />
        <label>제외할 내용 (선택)</label>
        <input type="text" id="exclude" placeholder="코딩 필요 방법, 고비용 툴" />
        <button class="btn-primary" id="btn-start" onclick="startGeneration()">주제 후보 생성 →</button>
        <div id="gen-error" style="color:#dc2626;font-size:13px;margin-top:8px;display:none"></div>
      </div>
    </div>
  </div>

  <!-- ── 오른쪽: 검수 대기 ──────────────────────────── -->
  <div>
    <div class="card">
      <div class="card-title">
        📋 검수 대기
        <span id="pending-count" style="font-size:12px;color:#888;font-weight:500"></span>
        <button class="btn-ghost btn-sm" style="margin-left:auto" onclick="loadPending()">새로고침</button>
      </div>
      <div class="draft-list" id="draft-list">
        <div class="empty">로딩 중…</div>
      </div>
    </div>
  </div>

</div>

<!-- ── 초안 검수 모달 ──────────────────────────────── -->
<div class="overlay" id="modal-overlay" onclick="if(event.target===this)closeModal()">
  <div class="modal">
    <div class="modal-header">
      <span id="modal-ch-badge"></span>
      <h2 id="modal-title">초안 검수</h2>
      <button class="btn-ghost btn-sm" onclick="closeModal()">✕ 닫기</button>
    </div>
    <div class="modal-body">
      <pre id="modal-body"></pre>
    </div>
    <div class="modal-footer">
      <textarea id="memo" placeholder="수정 요청 내용 (수정 요청 시 입력)"></textarea>
      <div class="modal-actions">
        <button class="btn-approve" onclick="review('approved')">✓ 승인·발행</button>
        <button class="btn-revise"  onclick="review('revision')">✎ 수정 요청</button>
        <button class="btn-reject"  onclick="review('rejected')">✕ 반려</button>
      </div>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const API    = 'http://localhost:8000';
const userId = localStorage.getItem('cf_user_id');

if (!userId) {
  alert('온보딩을 먼저 완료해 주세요.');
  location.href = '/frontend/onboarding.html';
}

// ── 유틸 ──────────────────────────────────────────────────
function v(id) { return document.getElementById(id)?.value.trim() || ''; }

async function api(method, path, body) {
  const res = await fetch(API + path, {
    method,
    headers: { 'Content-Type': 'application/json' },
    body: body ? JSON.stringify(body) : undefined,
  });
  if (!res.ok) {
    const err = await res.json().catch(() => ({}));
    throw new Error(err.detail || `HTTP ${res.status}`);
  }
  return res.json();
}

function toast(msg, ok = true) {
  const el = document.getElementById('toast');
  el.textContent = ok ? '✓ ' + msg : '✗ ' + msg;
  el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), 2400);
}

function esc(s) {
  return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

// ── 콘텐츠 생성 ───────────────────────────────────────────
let currentSessionId = null;
let selectedTopicIdx = null;
let pollTimer = null;

async function startGeneration() {
  const kw = v('kw');
  if (!kw) { showGenError('키워드를 입력해 주세요.'); return; }
  const btn = document.getElementById('btn-start');
  btn.disabled = true; btn.textContent = '생성 중…';
  hideGenError();

  try {
    const res = await api('POST', '/api/sessions/', {
      user_id:       userId,
      input_keyword: kw,
      input_emotion: v('emotion'),
      input_exclude: v('exclude'),
    });
    currentSessionId = res.session_id;
    showTopicSelection(res.topic_candidates);
  } catch(e) {
    showGenError(e.message);
    btn.disabled = false; btn.textContent = '주제 후보 생성 →';
  }
}

function showTopicSelection(candidates) {
  const card = document.getElementById('gen-card');
  card.innerHTML = `
    <div class="card-title">✦ 주제 선택</div>
    <p style="font-size:13px;color:#666;margin-bottom:14px">마음에 드는 주제를 선택하세요.</p>
    <div class="topic-list">
      ${candidates.map((t, i) => `
        <div class="topic-card" id="topic-${i}" onclick="selectTopic(${i})">
          <div class="t-title">${esc(t.title)}</div>
          <div class="t-msg">${esc(t.message)}</div>
          <div class="t-badge"># ${esc(t.channel || '')} · ${esc(t.emotion || '')}</div>
        </div>`).join('')}
    </div>
    <div id="ch-section" style="display:none;margin-top:18px">
      <p style="font-size:13px;font-weight:600;margin-bottom:10px">생성할 채널 선택</p>
      <div class="ch-row">
        <div class="ch-chip selected" data-ch="blog"       onclick="toggleCh(this)">📝 블로그</div>
        <div class="ch-chip selected" data-ch="newsletter" onclick="toggleCh(this)">📧 뉴스레터</div>
        <div class="ch-chip"          data-ch="youtube"    onclick="toggleCh(this)">🎬 유튜브</div>
        <div class="ch-chip"          data-ch="shortform"  onclick="toggleCh(this)">📱 숏폼</div>
      </div>
      <button class="btn-primary" onclick="generateDrafts()">초안 생성 시작 →</button>
    </div>
    <button class="btn-ghost btn-sm" style="margin-top:12px;width:100%" onclick="resetGenForm()">← 다시 입력</button>
  `;
  window._topicCandidates = candidates;
  selectedTopicIdx = null;
}

function selectTopic(i) {
  document.querySelectorAll('.topic-card').forEach((c, j) => c.classList.toggle('selected', i === j));
  selectedTopicIdx = i;
  document.getElementById('ch-section').style.display = 'block';
}

function toggleCh(el) { el.classList.toggle('selected'); }

async function generateDrafts() {
  if (selectedTopicIdx === null) { toast('주제를 선택해 주세요.', false); return; }
  const channels = [...document.querySelectorAll('.ch-chip.selected')].map(el => el.dataset.ch);
  if (!channels.length) { toast('채널을 1개 이상 선택해 주세요.', false); return; }
  const topic = window._topicCandidates[selectedTopicIdx];

  try {
    await api('POST', `/api/sessions/${currentSessionId}/generate`, {
      selected_topic: topic,
      channels,
    });
    showGeneratingStatus();
    pollTimer = setInterval(() => pollSession(), 4000);
  } catch(e) { toast(e.message, false); }
}

function showGeneratingStatus() {
  const card = document.getElementById('gen-card');
  card.innerHTML = `
    <div class="card-title">✦ 초안 생성 중</div>
    <div class="status-box">
      <div class="status-text"><span class="spinner"></span>LLM이 초안을 작성하고 있어요</div>
      <div class="status-sub">채널별로 순차 생성합니다. 잠시 기다려 주세요.</div>
    </div>
    <div id="poll-status" style="margin-top:12px;font-size:12px;color:#aaa;text-align:center"></div>
  `;
}

async function pollSession() {
  try {
    const data = await api('GET', `/api/sessions/${currentSessionId}`);
    if (data.status === 'review') {
      clearInterval(pollTimer);
      onGenerationDone(data);
    } else {
      const el = document.getElementById('poll-status');
      if (el) el.textContent = `상태: ${data.status} · 초안 ${data.drafts?.length || 0}개 완료`;
    }
  } catch(e) { clearInterval(pollTimer); toast(e.message, false); }
}

function onGenerationDone(data) {
  const card = document.getElementById('gen-card');
  card.innerHTML = `
    <div class="card-title">✦ 생성 완료 🎉</div>
    <div class="status-box" style="background:#f0fdf4;border-color:#bbf7d0">
      <div class="status-text" style="color:#16a34a">초안 ${data.drafts?.length || 0}개 생성됐어요</div>
      <div class="status-sub">오른쪽 검수 대기 목록에서 확인하세요.</div>
    </div>
    <button class="btn-primary" style="margin-top:12px" onclick="resetGenForm()">새 콘텐츠 생성</button>
  `;
  loadPending();
}

function resetGenForm() {
  clearInterval(pollTimer);
  const card = document.getElementById('gen-card');
  card.innerHTML = `
    <div class="card-title">✦ 새 콘텐츠 생성</div>
    <div id="gen-form">
      <label>키워드</label>
      <input type="text" id="kw" placeholder="50대 직장인 AI 부업" />
      <label>타겟 감정</label>
      <input type="text" id="emotion" placeholder="퇴직 불안, 수입 걱정" />
      <label>제외할 내용 (선택)</label>
      <input type="text" id="exclude" placeholder="코딩 필요 방법, 고비용 툴" />
      <button class="btn-primary" id="btn-start" onclick="startGeneration()">주제 후보 생성 →</button>
      <div id="gen-error" style="color:#dc2626;font-size:13px;margin-top:8px;display:none"></div>
    </div>
  `;
}

function showGenError(msg) {
  const el = document.getElementById('gen-error');
  if (el) { el.textContent = msg; el.style.display = 'block'; }
}
function hideGenError() {
  const el = document.getElementById('gen-error');
  if (el) el.style.display = 'none';
}

// ── 검수 대기 목록 ─────────────────────────────────────────
async function loadPending() {
  const list = document.getElementById('draft-list');
  list.innerHTML = '<div class="empty">로딩 중…</div>';
  try {
    const drafts = await api('GET', `/api/drafts/pending?user_id=${userId}`);
    document.getElementById('pending-count').textContent = drafts.length ? `(${drafts.length})` : '';
    if (!drafts.length) {
      list.innerHTML = '<div class="empty">검수 대기 중인 초안이 없어요.</div>';
      return;
    }
    const CH_LABEL = { blog:'블로그', newsletter:'뉴스레터', youtube:'유튜브', shortform:'숏폼' };
    list.innerHTML = drafts.map(d => `
      <div class="draft-card${d.has_content ? '' : ' no-content'}"
           data-id="${esc(d.id)}" data-ch="${esc(d.channel_type)}" data-title="${esc(d.title||'')}">
        <div class="draft-meta">
          <span class="ch-badge ${esc(d.channel_type)}">${CH_LABEL[d.channel_type] || esc(d.channel_type)}</span>
          ${d.has_content
            ? `<span class="qc-badge ${d.qc_passed ? 'qc-ok' : 'qc-fail'}">${d.qc_passed ? 'QC ✓' : 'QC ✗'}</span>`
            : `<span class="qc-badge" style="background:#fef9c3;color:#854d0e">⚠ 내용 없음</span>`}
        </div>
        <div class="draft-title">${esc(d.title || '(제목 없음)')}</div>
      </div>`).join('');
    list.querySelectorAll('.draft-card').forEach(card => {
      card.addEventListener('click', () =>
        openDraft(card.dataset.id, card.dataset.ch, card.dataset.title)
      );
    });
  } catch(e) {
    list.innerHTML = `<div class="empty">로드 실패: ${esc(e.message)}</div>`;
  }
}

// ── 초안 검수 모달 ─────────────────────────────────────────
let currentDraftId = null;

async function openDraft(id, chType, title) {
  currentDraftId = id;
  document.getElementById('modal-title').textContent = title || '초안 검수';
  document.getElementById('modal-body').textContent  = '로딩 중…';
  document.getElementById('memo').value = '';
  const CH_LABEL = { blog:'블로그', newsletter:'뉴스레터', youtube:'유튜브', shortform:'숏폼' };
  const badge = document.getElementById('modal-ch-badge');
  badge.className = `ch-badge ${chType}`;
  badge.textContent = CH_LABEL[chType] || chType;
  document.getElementById('modal-overlay').classList.add('open');

  try {
    const data = await api('GET', `/api/drafts/${id}`);
    const bodyEl = document.getElementById('modal-body');
    if (data.body_md) {
      bodyEl.textContent = data.body_md;
    } else {
      bodyEl.innerHTML = `
        <div style="text-align:center;padding:40px 20px;color:#888">
          <div style="font-size:40px;margin-bottom:12px">⚠️</div>
          <div style="font-weight:700;font-size:15px;margin-bottom:8px">초안 내용이 비어 있어요</div>
          <div style="font-size:13px;margin-bottom:20px;line-height:1.6">
            생성 중 오류가 발생한 초안이에요.<br>
            삭제 후 대시보드에서 다시 생성하세요.
          </div>
          <button class="btn-danger" onclick="deleteDraft()">이 초안 삭제</button>
        </div>`;
    }
  } catch(e) {
    document.getElementById('modal-body').textContent = `로드 실패: ${e.message}`;
  }
}

function closeModal() {
  document.getElementById('modal-overlay').classList.remove('open');
  currentDraftId = null;
}

async function deleteDraft() {
  if (!currentDraftId) return;
  if (!confirm('이 초안을 삭제할까요?')) return;
  try {
    await api('DELETE', `/api/drafts/${currentDraftId}`);
    toast('삭제됨');
    closeModal();
    loadPending();
  } catch(e) { toast(e.message, false); }
}

async function review(action) {
  if (!currentDraftId) return;
  const memo = document.getElementById('memo').value.trim();
  if (action === 'revision' && !memo) {
    toast('수정 요청 내용을 입력해 주세요.', false); return;
  }
  try {
    await api('POST', `/api/sessions/drafts/${currentDraftId}/review`, { action, memo: memo || null });
    const labels = { approved: '승인·발행 처리됨', revision: '수정 요청 전송됨', rejected: '반려됨' };
    toast(labels[action]);
    closeModal();
    loadPending();
  } catch(e) { toast(e.message, false); }
}

// ── 초기 로드 ─────────────────────────────────────────────
loadPending();
</script>
</body>
