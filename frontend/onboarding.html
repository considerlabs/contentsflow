<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ContentFlow — 온보딩</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Noto Sans KR', sans-serif;
         background: #f5f5f5; color: #222; min-height: 100vh;
         display: flex; align-items: center; justify-content: center; padding: 24px; }
  .card { background: #fff; border-radius: 16px; padding: 40px 48px;
          max-width: 560px; width: 100%; box-shadow: 0 4px 24px rgba(0,0,0,.08); }
  h1 { font-size: 22px; font-weight: 700; margin-bottom: 4px; }
  .subtitle { color: #666; font-size: 14px; margin-bottom: 32px; }
  .progress { display: flex; gap: 6px; margin-bottom: 36px; }
  .progress-dot { flex: 1; height: 4px; border-radius: 2px; background: #e0e0e0; transition: background .3s; }
  .progress-dot.active { background: #2563eb; }
  .step { display: none; }
  .step.active { display: block; }
  .step h2 { font-size: 17px; font-weight: 600; margin-bottom: 20px; }
  label { display: block; font-size: 13px; font-weight: 600; color: #444; margin-bottom: 6px; margin-top: 16px; }
  label:first-child { margin-top: 0; }
  input[type=text], input[type=email], textarea, select {
    width: 100%; border: 1.5px solid #ddd; border-radius: 8px;
    padding: 10px 12px; font-size: 14px; color: #222;
    transition: border-color .2s; outline: none; resize: vertical; }
  input:focus, textarea:focus, select:focus { border-color: #2563eb; }
  textarea { min-height: 80px; }
  .channel-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 4px; }
  .channel-card { border: 1.5px solid #ddd; border-radius: 10px; padding: 14px 16px;
                  cursor: pointer; transition: all .2s; user-select: none; }
  .channel-card.selected { border-color: #2563eb; background: #eff6ff; }
  .channel-card input { display: none; }
  .channel-card .ch-name { font-weight: 600; font-size: 14px; }
  .channel-card .ch-desc { font-size: 12px; color: #888; margin-top: 2px; }
  .nav { display: flex; gap: 10px; margin-top: 32px; justify-content: flex-end; }
  button { padding: 10px 24px; border-radius: 8px; border: none; cursor: pointer;
           font-size: 14px; font-weight: 600; transition: all .2s; }
  .btn-back { background: #f0f0f0; color: #444; }
  .btn-back:hover { background: #e0e0e0; }
  .btn-next { background: #2563eb; color: #fff; }
  .btn-next:hover { background: #1d4ed8; }
  .btn-next:disabled { background: #93c5fd; cursor: not-allowed; }
  .error { color: #dc2626; font-size: 13px; margin-top: 12px; display: none; }
  .success-icon { font-size: 48px; text-align: center; margin-bottom: 16px; }
  .hint { font-size: 12px; color: #888; margin-top: 4px; }
</style>
</head>
<body>
<div class="card">
  <div class="progress" id="progress"></div>
  <div id="steps"></div>
</div>

<script>
const API = 'http://localhost:8000';
let step = 1;
const TOTAL = 5;
let userId   = localStorage.getItem('cf_user_id')   || '';
let personaId = localStorage.getItem('cf_persona_id') || '';
let rawAnswers = {};

// ── 스텝 정의 ────────────────────────────────────────────────
const steps = [
  {
    id: 1, title: '기본 정보',
    html: `
      <label>이름</label>
      <input type="text" id="f_name" placeholder="브라이언" />
      <label>이메일</label>
      <input type="email" id="f_email" placeholder="example@email.com" />
      <label>직업·경력 요약</label>
      <input type="text" id="f_career" placeholder="IT영업 15년, 스타트업 창업 경험" />
      <label>콘텐츠를 만드는 목적</label>
      <textarea id="f_purpose" placeholder="재직 중 사이드잡으로 월 100만원 수익 파이프라인 만들기"></textarea>
    `,
    required: ['f_name','f_email','f_career','f_purpose'],
    async onNext() {
      rawAnswers.name    = v('f_name');
      rawAnswers.email   = v('f_email');
      rawAnswers.career  = v('f_career');
      rawAnswers.purpose = v('f_purpose');
      // 사용자 생성 (이미 있으면 스킵)
      if (!userId) {
        const res = await api('POST', '/api/users/', { email: rawAnswers.email, name: rawAnswers.name });
        userId = res.id;
        localStorage.setItem('cf_user_id', userId);
      }
    }
  },
  {
    id: 2, title: '독자 분석',
    html: `
      <label>주요 독자층</label>
      <input type="text" id="f_audience" placeholder="50~60대 재직 중인 직장인, 퇴직 고민 중" />
      <label>독자의 가장 큰 고민</label>
      <textarea id="f_pain" placeholder="퇴직 후 수입이 끊길까봐 걱정됨"></textarea>
      <label>독자의 불안·두려움</label>
      <textarea id="f_fear" placeholder="AI가 뭔지도 모르는데 따라갈 수 있을까"></textarea>
    `,
    required: ['f_audience','f_pain','f_fear'],
    async onNext() {
      rawAnswers.audience = v('f_audience');
      rawAnswers.pain     = v('f_pain');
      rawAnswers.fear     = v('f_fear');
    }
  },
  {
    id: 3, title: '말투·스타일',
    html: `
      <label>말투 스타일</label>
      <select id="f_tone">
        <option value="해요체">해요체 (친근하고 부드럽게)</option>
        <option value="합니다체">합니다체 (공식적으로)</option>
        <option value="반말">반말 (가볍고 친밀하게)</option>
      </select>
      <label>절대 쓰지 않을 표현</label>
      <input type="text" id="f_forbidden" placeholder="쉽습니다, 간단합니다, 누구나" />
      <label>직접 검증한 경험 (구체적 수치 포함)</label>
      <textarea id="f_verified" placeholder="AI로 보고서 작성 시간 80% 절감 직접 확인. 월 2회 외주 프로젝트로 120만원 수입."></textarea>
      <p class="hint">이 정보로 AI가 당신만의 페르소나 파일을 생성합니다.</p>
    `,
    required: ['f_forbidden','f_verified'],
    async onNext() {
      rawAnswers.tone      = v('f_tone');
      rawAnswers.forbidden = v('f_forbidden');
      rawAnswers.verified  = v('f_verified');
      // 페르소나 생성
      const res = await api('POST', '/api/personas/generate', { user_id: userId, raw_answers: rawAnswers });
      personaId = res.persona_id;
      localStorage.setItem('cf_persona_id', personaId);
    }
  },
  {
    id: 4, title: '발행 채널 선택',
    html: `
      <p style="font-size:14px;color:#555;margin-bottom:16px;">사용할 채널을 선택하세요. API 키는 나중에 설정에서 입력할 수 있어요.</p>
      <div class="channel-grid">
        <label class="channel-card" onclick="toggleChannel(this)">
          <input type="checkbox" value="blog" checked>
          <div class="ch-name">📝 블로그</div>
          <div class="ch-desc">티스토리 자동 발행</div>
        </label>
        <label class="channel-card selected" onclick="toggleChannel(this)">
          <input type="checkbox" value="newsletter" checked>
          <div class="ch-name">📧 뉴스레터</div>
          <div class="ch-desc">스티비 자동 발송</div>
        </label>
        <label class="channel-card" onclick="toggleChannel(this)">
          <input type="checkbox" value="youtube">
          <div class="ch-name">🎬 유튜브</div>
          <div class="ch-desc">스크립트 구글 드라이브 저장</div>
        </label>
        <label class="channel-card" onclick="toggleChannel(this)">
          <input type="checkbox" value="shortform">
          <div class="ch-name">📱 숏폼</div>
          <div class="ch-desc">릴스·쇼츠·틱톡 대본</div>
        </label>
      </div>
    `,
    required: [],
    async onNext() {
      const checked = [...document.querySelectorAll('.channel-card input:checked')];
      const channelNames = { blog:'블로그', newsletter:'뉴스레터', youtube:'유튜브', shortform:'숏폼' };
      for (const cb of checked) {
        await api('POST', '/api/channels/', {
          user_id: userId,
          channel_type: cb.value,
          channel_name: channelNames[cb.value],
        });
      }
    }
  },
  {
    id: 5, title: '첫 번째 키워드',
    html: `
      <label>카테고리 이름</label>
      <input type="text" id="f_catname" placeholder="AI 사이드잡" />
      <label>첫 번째 키워드</label>
      <input type="text" id="f_kw" placeholder="50대 직장인 AI 부업" />
      <label>타겟 감정</label>
      <input type="text" id="f_emotion" placeholder="퇴직 불안, 수입 걱정" />
      <label>제외할 주제</label>
      <input type="text" id="f_exclude" placeholder="코딩 필요 방법, 고비용 툴" />
    `,
    required: ['f_catname','f_kw'],
    async onNext() {
      const catRes = await api('POST', '/api/categories/', {
        user_id: userId,
        name:    v('f_catname'),
        color:   '#2563eb',
      });
      await api('POST', '/api/keywords/', {
        user_id:        userId,
        category_id:    catRes.id,
        keyword:        v('f_kw'),
        target_emotion: v('f_emotion'),
        exclude_topics: v('f_exclude'),
      });
    }
  },
];

// ── 유틸 ─────────────────────────────────────────────────────
function v(id) { const el = document.getElementById(id); return el ? el.value.trim() : ''; }

async function api(method, path, body) {
  const res = await fetch(API + path, {
    method,
    headers: { 'Content-Type': 'application/json' },
    body: body ? JSON.stringify(body) : undefined,
  });
  if (!res.ok) {
    const err = await res.json().catch(() => ({}));
    throw new Error(err.detail || `HTTP ${res.status}`);
  }
  return res.json();
}

function toggleChannel(label) {
  const cb = label.querySelector('input');
  cb.checked = !cb.checked;
  label.classList.toggle('selected', cb.checked);
}

// ── 렌더링 ───────────────────────────────────────────────────
function render() {
  // 진행바
  const prog = document.getElementById('progress');
  prog.innerHTML = Array.from({length: TOTAL}, (_, i) =>
    `<div class="progress-dot ${i < step ? 'active' : ''}"></div>`
  ).join('');

  const container = document.getElementById('steps');
  if (step > TOTAL) {
    container.innerHTML = `
      <div class="success-icon">🎉</div>
      <h1 style="text-align:center">온보딩 완료!</h1>
      <p class="subtitle" style="text-align:center;margin-top:8px">콘텐츠 생성 준비가 됐어요.</p>
      <div class="nav" style="justify-content:center">
        <button class="btn-next" onclick="location.href='/frontend/settings.html'">설정으로 이동</button>
      </div>`;
    return;
  }

  const s = steps[step - 1];
  container.innerHTML = `
    <h1>ContentFlow</h1>
    <p class="subtitle">Step ${step} / ${TOTAL} — ${s.title}</p>
    <div class="step active">
      <h2>${s.title}</h2>
      ${s.html}
      <div class="error" id="err"></div>
      <div class="nav">
        ${step > 1 ? '<button class="btn-back" id="btnBack">← 이전</button>' : ''}
        <button class="btn-next" id="btnNext">${step === TOTAL ? '완료 ✓' : '다음 →'}</button>
      </div>
    </div>`;

  if (step > 1) document.getElementById('btnBack').onclick = () => { step--; render(); };
  document.getElementById('btnNext').onclick = async () => {
    const btn = document.getElementById('btnNext');
    const errEl = document.getElementById('err');
    // 필수값 체크
    for (const id of s.required) {
      if (!v(id)) { errEl.textContent = '모든 필수 항목을 입력해 주세요.'; errEl.style.display = 'block'; return; }
    }
    errEl.style.display = 'none';
    btn.disabled = true; btn.textContent = '처리 중…';
    try {
      await s.onNext();
      step++;
      render();
    } catch(e) {
      errEl.textContent = e.message; errEl.style.display = 'block';
      btn.disabled = false; btn.textContent = step === TOTAL ? '완료 ✓' : '다음 →';
    }
  };

  // 채널 카드 초기 상태
  document.querySelectorAll('.channel-card').forEach(card => {
    const cb = card.querySelector('input');
    card.classList.toggle('selected', cb.checked);
    card.onclick = function() { toggleChannel(this); };
  });
}

// ── 이미 온보딩 완료 확인 ────────────────────────────────────
if (userId) {
  fetch(`${API}/api/users/${userId}`)
    .then(r => r.json())
    .then(u => {
      if (u.onboarding_done) {
        if (confirm('이미 온보딩이 완료됐어요. 설정 페이지로 이동할까요?'))
          location.href = '/frontend/settings.html';
      } else render();
    })
    .catch(() => render());
} else {
  render();
}
</script>
</body>
</html>
